<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kingman HS Lost & Found</title>
    <link rel="stylesheet" href="css/nav.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="logo">Kingman High School</a>
        <button class="menu-toggle" aria-label="Toggle menu">☰</button>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="report.html">Report a Lost Item</a></li>
            <li><a href="found.html">Found Items</a></li>
            <li><a href="claims.html">Claim & Inquiries</a></li>
            <li><a href="login.html" class="active">Login</a></li>
        </ul>
    </nav>

    <header>
        <h1>Login</h1>
        <p>Sign in with your school email and password</p>
    </header>

    <main>
        <section class="auth-section">
            <div class="auth-container">
                <div id="loginForm" class="auth-form">
                    <h2>Sign In</h2>
                    <form id="signInForm">
                        <div class="form-group">
                            <label for="loginEmail">Email:</label>
                            <input type="email" id="loginEmail" name="loginEmail" required
                                placeholder="yourname@knusd331.com">
                        </div>

                        <div class="form-group">
                            <label for="loginPassword">Password:</label>
                            <input type="password" id="loginPassword" name="loginPassword" required
                                placeholder="Enter password">
                        </div>
                        <br>
                        <button type="submit">Login</button>
                    </form>
                    <p id="loginError" style="color: red; display: none; margin-top: 10px; text-align: center;"></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <h1 id="footer_heading" class="heading">CONTACT US</h1>
        <p class="footer_text">Phone: 620-532-3134</p>
        <p class="footer_text">260 W Kansas Ave, Kingman, KS 67068</p>
    </footer>

    <script src="https://unpkg.com/pocketbase@0.22.1/dist/pocketbase.umd.js"></script>
    <script src="js/pb-config.js"></script>

    <script>
        document.getElementById('signInForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');

            errorEl.style.display = 'none';
            errorEl.textContent = '';

            try {
                // Yeah use the user collection for the authentication
                const authData = await pb.collection('users').authWithPassword(email, password);

                const role = user.roles || 'student';

                console.log('Logged in as:', email, 'Role:', role);

                alert(`Welcome, ${user.name || 'User'}! (${role})`);

                // Use the role and find the right place
                if (role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    const redirect = localStorage.getItem('redirectAfterLogin') || 'profile.html';
                    localStorage.removeItem('redirectAfterLogin');
                    window.location.href = redirect;
                }

            } catch (err) {
                console.error('Login error:', err);

                let msg = 'Login failed. Please check your email and password.';
                if (err.status === 400 || err.status === 401) {
                    msg = 'Invalid email or password.';
                } else if (err.status) {
                    msg += ` (Error ${err.status})`;
                }

                errorEl.textContent = msg;
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>

</html>
