<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Found Items - Kingman HS Lost & Found</title>
    <link rel="stylesheet" href="css/nav.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .search-section {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        input,
        select,
        button {
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #444;
            font-size: 1rem;
            background: #2a2a2a;
            color: #e0e0e0;
        }

        input::placeholder {
            color: #888;
        }

        button {
            cursor: pointer;
            font-weight: bold;
        }

        .btn-reset {
            background: #f44336;
            color: white;
        }

        .btn-reset:hover {
            background: #d32f2f;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .item-card {
            background: #1e1e1e;
            border: 1px solid #444;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .item-card:hover {
            transform: translateY(-5px);
        }

        .item-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .item-content {
            padding: 16px;
        }

        .item-category {
            background: #4caf50;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-block;
            margin-bottom: 10px;
        }

        .item-card h3 {
            margin: 0 0 12px;
            color: #ff7961;
            font-size: 1.35rem;
        }

        .item-card p {
            margin: 8px 0;
            color: #ccc;
            font-size: 0.95rem;
        }

        .highlight {
            background: #444;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .btn-claim {
            margin-top: 12px;
            padding: 12px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        .btn-claim:hover {
            background: #1976d2;
        }

        .no-results,
        .loading {
            text-align: center;
            padding: 4rem 1rem;
            color: #888;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="index.html" class="logo">Kingman High School</a>
        <button class="menu-toggle" aria-label="Toggle menu">☰</button>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="report.html">Report a Lost Item</a></li>
            <li><a href="found.html" class="active">Found Items</a></li>
            <li><a href="claims.html">Claim & Inquiries</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <header>
        <h1>Found Items</h1>
        <p>Approved items that have been found and turned in</p>
    </header>

    <section class="search-section">
        <input type="text" id="searchInput" placeholder="Search name, description, location...">
        <select id="categoryFilter">
            <option value="">All Categories</option>
            <option value="backpack">Backpack</option>
            <option value="clothing">Clothing</option>
            <option value="electronics">Electronics</option>
            <option value="jewelry">Jewelry</option>
            <option value="keys">Keys</option>
            <option value="wallet">Wallet</option>
            <option value="other">Other</option>
        </select>
        <button id="resetBtn" class="btn-reset">Reset</button>
    </section>

    <div id="loading" class="loading">Loading approved items...</div>

    <div id="itemsContainer" class="items-grid"></div>

    <div id="noResults" class="no-results" style="display:none;">
        No approved items found yet.<br><br>
        Items appear here only after an admin approves them in the dashboard.
    </div>

    <script type="module">
        import { db } from './firebase.js';
        import { collection, getDocs, query, where, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let approvedItems = [];

        // Simple keyword filter + highlight
        function filterItems(queryStr, category) {
            const q = queryStr.toLowerCase().trim();
            return approvedItems.filter(item => {
                if (category && item.category !== category) return false;
                if (!q) return true;

                const text = [
                    item.name,
                    item.description,
                    item.location || '',
                    item.category
                ].join(' ').toLowerCase();

                return text.includes(q);
            });
        }

        function highlight(text, queryStr) {
            if (!queryStr.trim()) return text;
            const regex = new RegExp(`(${queryStr.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        async function loadApprovedItems() {
            const loadingEl = document.getElementById('loading');
            const container = document.getElementById('itemsContainer');
            const noResults = document.getElementById('noResults');

            loadingEl.innerHTML = "Loading approved found items...";

            try {
                const q = query(
                    collection(db, "lostAndFound"),           // ← FIXED: matches your admin panel
                    where("status", "==", "approved")
                );

                const snapshot = await getDocs(q);

                approvedItems = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    approvedItems.push({
                        id: doc.id,
                        name: data.title || data.name || "Unnamed Item",
                        description: data.description || "No description",
                        category: data.category || "other",
                        location: data.location || "—",
                        dateFound: data.dateFound || data.dateLost || null,
                        contact: data.contact || "Lost & Found Office",
                        imageBase64: data.imageBase64 || ""
                    });
                });

                loadingEl.style.display = 'none';

                if (approvedItems.length === 0) {
                    noResults.innerHTML = `
                        No approved items found in the system yet.<br><br>
                        • Only items with <strong>status: "approved"</strong> appear here.<br>
                        • Check admin dashboard → make sure items are approved.<br>
                        • Collection name: <code>lostAndFound</code> (as used in admin panel).
                    `;
                    noResults.style.display = 'block';
                } else {
                    displayItems(approvedItems);
                }

            } catch (err) {
                loadingEl.innerHTML = `
                    <div style="color:#f44336; font-weight:bold; padding:1.5rem; background:#400; border-radius:8px;">
                        Error loading items: ${err.message || err.code || "Unknown error"}<br><br>
                        ${err.code === 'permission-denied' ? '→ Firebase security rules are blocking read access' : ''}
                    </div>
                `;
                console.error("Firestore fetch error:", err);
            }
        }

        function displayItems(items) {
            const container = document.getElementById('itemsContainer');
            container.innerHTML = '';

            const queryStr = document.getElementById('searchInput').value.trim();

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';

                const img = item.imageBase64
                    ? `<img src="${item.imageBase64}" alt="${item.name}">`
                    : `<div style="height:200px; background:#333; display:flex; align-items:center; justify-content:center; color:#666;">
                         No Image
                       </div>`;

                const nameHl = highlight(item.name, queryStr);
                const descHl = highlight(item.description, queryStr);

                card.innerHTML = `
                    ${img}
                    <div class="item-content">
                        <span class="item-category">${item.category}</span>
                        <h3>${nameHl}</h3>
                        <p>${descHl}</p>
                        <p><strong>Location:</strong> ${item.location}</p>
                        <p><strong>Found:</strong> ${item.dateFound ? new Date(item.dateFound).toLocaleDateString() : '—'}</p>
                        <p><strong>Contact:</strong> ${item.contact}</p>
                        <button class="btn-claim" onclick="claimItem('${item.id}')">Claim This Item</button>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        window.claimItem = async function (id) {
            const item = approvedItems.find(i => i.id === id);
            if (!item) return alert('Item not found.');

            const name = prompt("Your full name:")?.trim();
            const email = prompt("Your email or student ID:")?.trim();

            if (!name || !email) return;

            if (!confirm(`Submit claim for "${item.name}"?`)) return;

            try {
                await addDoc(collection(db, 'claims'), {
                    itemId: id,
                    itemName: item.name,
                    claimantName: name,
                    claimantEmail: email,
                    category: item.category,
                    description: item.description,
                    location: item.location,
                    dateFound: item.dateFound,
                    status: 'pending',
                    createdAt: serverTimestamp()
                });
                alert('Claim submitted successfully! We will review it.');
            } catch (err) {
                alert('Error submitting claim:\n' + err.message);
            }
        };

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', () => {
            displayItems(filterItems(document.getElementById('searchInput').value, document.getElementById('categoryFilter').value));
        });

        document.getElementById('categoryFilter').addEventListener('change', () => {
            displayItems(filterItems(document.getElementById('searchInput').value, document.getElementById('categoryFilter').value));
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('categoryFilter').value = '';
            displayItems(approvedItems);
        });

        // Load on page start
        loadApprovedItems();
    </script>
</body>

</html>
