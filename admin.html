<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel | Kingman HS Lost & Found</title>
    <link rel="stylesheet" href="css/nav.css" />
    <link rel="stylesheet" href="css/style.css" />
    <!-- Add any admin-specific CSS -->
</head>

<body>

    <!-- Your navbar here (same as other pages) -->
    <nav class="navbar">...</nav>

    <header>
        <h1>Admin Panel</h1>
        <p>Manage reports, users, and claims</p>
    </header>

    <main class="admin-layout">
        <!-- Section 1: Pending Lost Items for Review/Accept -->
        <section>
            <h2>Pending Lost Item Reports</h2>
            <div id="pendingItems"></div>
            <button onclick="loadPendingItems()">Refresh</button>
        </section>

        <!-- Section 2: Manage Users -->
        <section>
            <h2>Manage Users</h2>
            <form id="createUserForm">
                <input type="email" id="newEmail" placeholder="Email" required>
                <input type="password" id="newPassword" placeholder="Password" required>
                <input type="text" id="newName" placeholder="Name">
                <button type="submit">Create User</button>
            </form>
            <div id="usersList"></div>
        </section>

        <!-- Section 3: Claims (if you have a 'claims' collection) -->
        <section>
            <h2>Review Claims</h2>
            <div id="claimsList"></div>
        </section>
    </main>

    <script src="https://unpkg.com/pocketbase@0.22.1/dist/pocketbase.umd.js"></script>
    <script src="js/pb-config.js"></script> <!-- your PB_URL setup -->
    <script src="js/nav.js"></script> <!-- if you have it -->

    <script>
        // ── Admin-only protection ──────────────────────────────────────
        if (!pb.authStore.isValid) {
            alert('Please log in first.');
            location.href = 'auth.html';
        }

        // Optional: Check if superuser (admin) - requires fetching user record
        async function checkIsAdmin() {
            try {
                const user = await pb.collection('users').getOne(pb.authStore.model.id);
                // Assume you added a boolean 'isAdmin' field to users collection (default false)
                if (!user.isAdmin) {
                    alert('Admin access only.');
                    location.href = 'profile.html';
                }
            } catch (err) {
                console.error('Admin check failed', err);
            }
        }
        checkIsAdmin(); // Run on load

        // ── Load pending items ─────────────────────────────────────────
        async function loadPendingItems() {
            try {
                const res = await pb.collection('lost_items').getList(1, 50, {
                    filter: 'status = "pending"',
                    sort: '-created'
                });

                const container = document.getElementById('pendingItems');
                container.innerHTML = '';

                if (res.items.length === 0) {
                    container.innerHTML = '<p>No pending reports.</p>';
                    return;
                }

                res.items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'admin-item';
                    div.innerHTML = `
                        <h4>${item.title}</h4>
                        <p>${item.description}</p>
                        <p>Location: ${item.location} | Date: ${item.dateLost}</p>
                        <button onclick="updateStatus('${item.id}', 'accepted')">Accept</button>
                        <button onclick="updateStatus('${item.id}', 'rejected')">Reject</button>
                        <button onclick="deleteItem('${item.id}')">Delete</button>
                    `;
                    container.appendChild(div);
                });
            } catch (err) {
                console.error(err);
                alert('Error loading items: ' + err.message);
            }
        }

        async function updateStatus(id, newStatus) {
            if (!confirm(`Set status to ${newStatus}?`)) return;
            try {
                await pb.collection('lost_items').update(id, { status: newStatus });
                alert('Updated!');
                loadPendingItems(); // refresh
            } catch (err) {
                alert('Update failed: ' + err.message);
            }
        }

        async function deleteItem(id) {
            if (!confirm('Delete this report permanently?')) return;
            try {
                await pb.collection('lost_items').delete(id);
                alert('Deleted');
                loadPendingItems();
            } catch (err) {
                alert('Delete failed: ' + err.message);
            }
        }

        // ── Create user ────────────────────────────────────────────────
        document.getElementById('createUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('newEmail').value;
            const password = document.getElementById('newPassword').value;
            const name = document.getElementById('newName').value;

            try {
                await pb.collection('users').create({ email, password, passwordConfirm: password, name });
                alert('User created!');
                loadUsers(); // if you add a list function
            } catch (err) {
                alert('Create failed: ' + (err.data?.message || err.message));
            }
        });

        // ── Load users list (example) ──────────────────────────────────
        async function loadUsers() {
            try {
                const res = await pb.collection('users').getList(1, 50, { sort: '-created' });
                const container = document.getElementById('usersList');
                container.innerHTML = res.items.map(u => `
                    <div>
                        ${u.name || u.email} (${u.email})
                        <button onclick="deleteUser('${u.id}')">Delete</button>
                        <!-- Add edit form/button as needed -->
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        // Call on load
        loadPendingItems();
        loadUsers(); // if implemented

        // ── Delete user ────────────────────────────────────────────────
        async function deleteUser(id) {
            if (!confirm('Delete user?')) return;
            try {
                await pb.collection('users').delete(id);
                alert('User deleted');
                loadUsers();
            } catch (err) {
                alert('Delete failed: ' + err.message);
            }
        }

        // For claims: similar to pendingItems, but for 'claims' collection
        // Example filter: 'status = "pending"'
        // Update status to 'verified', etc.

    </script>
</body>

</html>
