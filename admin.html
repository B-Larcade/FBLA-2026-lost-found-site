<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Kingman HS Lost & Found</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #1b1b1b;
            color: #e0e0e0;
            line-height: 1.5;
        }

        header {
            background-color: #111;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #333;
        }

        header h1 {
            margin: 0;
            font-size: 2.1rem;
            color: #f44336;
        }

        nav.tabs {
            display: flex;
            justify-content: center;
            background: #1e1e1e;
            padding: 12px 0;
            border-bottom: 1px solid #444;
        }

        nav.tabs button {
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 1.1rem;
            padding: 10px 24px;
            cursor: pointer;
            transition: all 0.2s;
        }

        nav.tabs button.active {
            color: #fff;
            border-bottom: 3px solid #f44336;
            font-weight: bold;
        }

        nav.tabs button:hover {
            color: #ddd;
        }

        main {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            margin: 0 0 16px;
            color: #ff7961;
            font-size: 1.4rem;
        }

        .refresh-btn {
            background: #2196f3;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 16px;
            font-weight: bold;
        }

        .refresh-btn:hover {
            background: #42a5f5;
        }

        .card-container {
            display: grid;
            gap: 16px;
        }

        .item-card,
        .claim-card {
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: row;
            gap: 16px;
        }

        .item-card img {
            width: 140px;
            height: auto;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #555;
        }

        .card-content {
            flex: 1;
        }

        .card-content h3,
        .card-content h2 {
            margin: 0 0 8px;
            color: #ff7961;
            font-size: 1.25rem;
        }

        .card-content p {
            margin: 6px 0;
            font-size: 0.95rem;
            color: #ccc;
        }

        .status {
            font-weight: bold;
        }

        .status-pending {
            color: #ff9800;
        }

        .status-approved {
            color: #4caf50;
        }

        .status-denied {
            color: #f44336;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 140px;
        }

        button {
            padding: 8px 14px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: 0.15s;
        }

        .approve {
            background: #4caf50;
        }

        .approve:hover {
            background: #66bb6a;
        }

        .deny,
        .disapprove {
            background: #f44336;
        }

        .deny:hover,
        .disapprove:hover {
            background: #e57373;
        }

        .download {
            background: #2196f3;
        }

        .download:hover {
            background: #42a5f5;
        }

        @media (max-width: 768px) {

            .item-card,
            .claim-card {
                flex-direction: column;
            }

            .buttons {
                flex-direction: row;
                flex-wrap: wrap;
            }
        }
    </style>
</head>

<body>

    <header>
        <a href="index.html">
            <h1>Admin Dashboard</h1>
        </a>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" data-tab="reports">Lost Item Reports</button>
        <button class="tab-btn" data-tab="claims">Claims & Inquiries</button>
    </nav>

    <main>

        <!-- Reports Tab -->
        <section id="reports-tab" class="tab-content">
            <h2 class="section-title">Lost Item Reports</h2>
            <button class="refresh-btn" onclick="loadReports()">↻ Refresh Reports</button>
            <div id="reports-container" class="card-container"></div>
        </section>

        <!-- Claims Tab -->
        <section id="claims-tab" class="tab-content" style="display:none;">
            <h2 class="section-title">Item Claims</h2>
            <button class="refresh-btn" onclick="loadClaims()">↻ Refresh Claims</button>
            <div id="claims-container" class="card-container"></div>
        </section>

    </main>

    <script type="module">
        import { db } from "./firebase.js";
        import {
            collection, query, onSnapshot, doc, updateDoc, deleteDoc, orderBy
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                document.querySelectorAll('.tab-content').forEach(tab => tab.style.display = 'none');
                document.getElementById(`${btn.dataset.tab}-tab`).style.display = 'block';
            });
        });

        // ────────────────────────────────────────────────
        //  LOST ITEM REPORTS
        // ────────────────────────────────────────────────
        function loadReports() {
            const container = document.getElementById("reports-container");
            container.innerHTML = "<p>Loading reports...</p>";

            const q = query(collection(db, "lostAndFound"), orderBy("createdAt", "desc"));

            onSnapshot(q, (snapshot) => {
                container.innerHTML = "";

                if (snapshot.empty) {
                    container.innerHTML = "<p>No reports found.</p>";
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const id = docSnap.id;

                    const card = document.createElement("div");
                    card.className = "item-card";

                    card.innerHTML = `
                        <img src="${data.imageBase64 || 'https://via.placeholder.com/140?text=No+Image'}" alt="Item">
                        <div class="card-content">
                            <h2>${data.title || "Unnamed Item"}</h2>
                            <p><strong>Status:</strong> <span class="status status-${data.status}">${data.status}</span></p>
                            <p><strong>Category:</strong> ${data.category || "—"}</p>
                            <p><strong>Date Lost:</strong> ${data.dateLost || "—"}</p>
                            <p><strong>Location:</strong> ${data.location || "—"}</p>
                            <p><strong>Submitted by:</strong> ${data.studentName || "?"} (${data.email || "—"})</p>
                            ${data.phone ? `<p><strong>Phone:</strong> ${data.phone}</p>` : ''}
                            <p>${data.description || ""}</p>
                        </div>
                        <div class="buttons">
                            ${data.status !== "approved" ? `<button class="approve" data-id="${id}">Approve</button>` : '<span style="color:#4caf50">Approved ✓</span>'}
                            <button class="disapprove" data-id="${id}">Delete</button>
                            ${data.imageBase64 ? `<button class="download" data-id="${id}">Download Image</button>` : ''}
                        </div>
                    `;

                    container.appendChild(card);
                });

                // Event listeners
                container.querySelectorAll('.approve').forEach(btn => {
                    btn.onclick = async () => {
                        const id = btn.dataset.id;
                        if (!confirm("Approve this report?")) return;
                        await updateDoc(doc(db, "lostAndFound", id), { status: "approved" });
                    };
                });

                container.querySelectorAll('.disapprove').forEach(btn => {
                    btn.onclick = async () => {
                        const id = btn.dataset.id;
                        if (!confirm("Delete this report permanently?")) return;
                        await deleteDoc(doc(db, "lostAndFound", id));
                    };
                });

                container.querySelectorAll('.download').forEach(btn => {
                    btn.onclick = () => {
                        const card = btn.closest('.item-card');
                        const img = card.querySelector('img');
                        if (img.src.startsWith('data:')) {
                            const a = document.createElement('a');
                            a.href = img.src;
                            a.download = `item-${btn.dataset.id}.png`;
                            a.click();
                        } else {
                            alert("No downloadable image available.");
                        }
                    };
                });
            });
        }

        // ────────────────────────────────────────────────
        //  CLAIMS
        // ────────────────────────────────────────────────
        function loadClaims() {
            const container = document.getElementById("claims-container");
            container.innerHTML = "<p>Loading claims...</p>";

            const q = query(collection(db, "claims"), orderBy("createdAt", "desc"));

            onSnapshot(q, (snapshot) => {
                container.innerHTML = "";

                if (snapshot.empty) {
                    container.innerHTML = "<p>No claims found.</p>";
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const id = docSnap.id;

                    const card = document.createElement("div");
                    card.className = "claim-card";

                    card.innerHTML = `
                        <div class="card-content">
                            <h3>${data.itemName || "Unnamed Item"}</h3>
                            <p><strong>Claimant:</strong> ${data.claimantName} (${data.claimantEmail})</p>
                            <p><strong>Phone:</strong> ${data.claimantPhone || "—"}</p>
                            <p><strong>Date lost:</strong> ${data.dateLost || "—"}</p>
                            <p><strong>Location:</strong> ${data.locationLost || "—"}</p>
                            <p><strong>Description:</strong> ${data.description || "—"}</p>
                            <p><strong>Proof:</strong><br>${data.proof || "—"}</p>
                            ${data.additionalInfo ? `<p><strong>Extra info:</strong><br>${data.additionalInfo}</p>` : ''}
                            <p><strong>Submitted:</strong> ${data.createdAt ? new Date(data.createdAt.toMillis()).toLocaleString() : "—"}</p>
                            <p><strong>Status:</strong> <span class="status status-${data.status}">${data.status.toUpperCase()}</span></p>
                        </div>
                        <div class="buttons">
                            ${data.status === "pending" ? `
                                <button class="approve" data-id="${id}">Approve Claim</button>
                                <button class="deny" data-id="${id}">Deny Claim</button>
                            ` : `<span style="color:#aaa">Reviewed (${data.status})</span>`}
                        </div>
                    `;

                    container.appendChild(card);
                });

                // Event listeners
                container.querySelectorAll('.approve').forEach(btn => {
                    btn.onclick = async () => {
                        const id = btn.dataset.id;
                        if (!confirm("Approve this claim?")) return;
                        await updateDoc(doc(db, "claims", id), {
                            status: "approved",
                            reviewedAt: new Date()
                        });
                    };
                });

                container.querySelectorAll('.deny').forEach(btn => {
                    btn.onclick = async () => {
                        const id = btn.dataset.id;
                        if (!confirm("Deny this claim? This cannot be undone.")) return;
                        await updateDoc(doc(db, "claims", id), {
                            status: "denied",
                            reviewedAt: new Date()
                        });
                    };
                });
            });
        }

        // Initial load
        loadReports();
        loadClaims();  // pre-load so switching tabs is instant
    </script>
</body>

</html>
